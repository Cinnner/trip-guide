<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CBB UK Guide">
<meta name="theme-color" content="#0f1f38">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230f1f38'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E👑%3C/text%3E%3C/svg%3E">
<title>CBB的UK奇妙之旅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1f38;
  --navy2: #1a2f4e;
  --navy3: #243d61;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --cream: #f5f0e8;
  --cream2: #ede5d4;
  --cream3: #faf7f2;
  --text: #1a1a2e;
  --muted: #6b6b7b;
  --green: #2d6a4f;
  --green-l: #e8f5ee;
  --amber: #92400e;
  --amber-l: #fef3c7;
  --purple: #4c1d95;
  --purple-l: #ede9fe;
  --red: #991b1b;
  --red-l: #fee2e2;
  --blue: #1e40af;
  --blue-l: #dbeafe;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(15,31,56,0.10);
  --shadow-lg: 0 8px 40px rgba(15,31,56,0.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream3);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  font-size: 16px;
  line-height: 1.65;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}
/* iPhone safe areas */
.app-header { padding-top: env(safe-area-inset-top); }
.main { padding-bottom: max(80px, calc(60px + env(safe-area-inset-bottom))); }
/* Touch targets min 44px */
.day-btn { min-height: 52px; padding: 8px 13px; }
.section-header { min-height: 52px; }
.attraction-header { min-height: 48px; }
.check-item { min-height: 44px; padding: 10px 0; }
/* Smooth scroll */
html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
/* Bottom safe area for day nav on iPhone */
.day-nav { padding-bottom: 0; }

/* ── Header ── */
.app-header {
  background: var(--navy);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.25);
}
.header-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-crown {
  font-size: 22px;
}
.header-titles { flex: 1 }
.header-title {
  font-family: 'Playfair Display', serif;
  color: var(--gold2);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .02em;
  line-height: 1.2;
}
.header-sub {
  color: rgba(255,255,255,.5);
  font-size: 11px;
  font-weight: 300;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.weather-pill {
  background: rgba(255,255,255,.08);
  border: 0.5px solid rgba(255,255,255,.15);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  color: rgba(255,255,255,.7);
  cursor: pointer;
  transition: background .2s;
  white-space: nowrap;
}
.weather-pill:hover { background: rgba(255,255,255,.14); }

/* ── Day Nav ── */
.day-nav {
  background: var(--navy2);
  border-bottom: 1px solid rgba(255,255,255,.07);
  overflow-x: auto;
  scrollbar-width: none;
}
.day-nav::-webkit-scrollbar { display: none; }
.day-nav-inner {
  display: flex;
  gap: 0;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 16px;
}
.day-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,.45);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 10px 13px 9px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  white-space: nowrap;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.day-btn .dnum { font-size: 16px; font-weight: 700; color: inherit; }
.day-btn:hover { color: rgba(255,255,255,.75); }
.day-btn.active { color: var(--gold2); border-bottom-color: var(--gold); }

/* ── Main Layout ── */
.main {
  max-width: 860px;
  margin: 0 auto;
  padding: 16px 12px 80px;
}

/* ── Day Hero ── */
.day-hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, var(--navy3) 100%);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.day-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(201,168,76,.15);
  border: 0.5px solid rgba(201,168,76,.4);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--gold2);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  color: #fff;
  font-size: 26px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 6px;
}
.hero-subtitle {
  color: rgba(255,255,255,.55);
  font-size: 13px;
  font-weight: 300;
}
.hero-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 16px;
}
.hero-tag {
  background: rgba(255,255,255,.08);
  border: 0.5px solid rgba(255,255,255,.15);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: rgba(255,255,255,.65);
}

/* ── Weather Card ── */
.weather-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,.05);
}
.weather-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.weather-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  display: flex;
  align-items: center;
  gap: 7px;
}
.weather-refresh {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 6px;
  border: 0.5px solid var(--cream2);
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.weather-refresh:hover { background: var(--cream); }
.weather-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px 18px;
  align-items: center;
}
.weather-main {
  display: flex;
  align-items: center;
  gap: 12px;
}
.weather-icon { font-size: 38px; line-height: 1; }
.weather-temp {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1;
}
.weather-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
.weather-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.weather-detail-item {
  background: var(--cream3);
  border-radius: 8px;
  padding: 7px 10px;
  font-size: 12px;
}
.weather-detail-item .wd-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; }
.weather-detail-item .wd-val { font-weight: 500; color: var(--text); margin-top: 1px; }
.weather-outfit {
  margin-top: 12px;
  padding: 10px 12px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  border-radius: 10px;
  font-size: 12px;
  color: rgba(255,255,255,.8);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.weather-outfit-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.weather-loading { text-align: center; color: var(--muted); padding: 20px; font-size: 13px; }
.weather-err { text-align: center; color: var(--red); padding: 16px; font-size: 12px; }

/* ── Section Cards ── */
.section-card {
  background: #fff;
  border-radius: var(--radius);
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,.04);
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px 13px;
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: background .15s;
  user-select: none;
}
.section-header:hover { background: var(--cream3); }
.section-header.open { border-bottom-color: var(--cream2); }
.section-icon {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.si-navy { background: var(--navy); }
.si-gold { background: linear-gradient(135deg, #c9a84c, #e8c97a); }
.si-green { background: #2d6a4f; }
.si-amber { background: #d97706; }
.si-purple { background: #6d28d9; }
.si-red { background: #dc2626; }
.section-label {
  flex: 1;
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--navy);
}
.section-chevron {
  color: var(--muted);
  font-size: 11px;
  transition: transform .2s;
}
.section-chevron.open { transform: rotate(90deg); }
.section-body { display: none; padding: 16px 18px 18px; }
.section-body.open { display: block; }

/* ── Timeline items ── */
.timeline { list-style: none; }
.tl-item {
  display: flex;
  gap: 12px;
  padding-bottom: 14px;
  position: relative;
}
.tl-item:last-child { padding-bottom: 0; }
.tl-item:not(:last-child) .tl-line::after {
  content: '';
  position: absolute;
  left: 6px;
  top: 16px;
  bottom: -2px;
  width: 1px;
  background: var(--cream2);
}
.tl-dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
  margin-top: 5px;
  position: relative;
  z-index: 1;
}
.tl-dot.alt { background: #7c3aed; }
.tl-dot.warn { background: #d97706; }
.tl-dot.note { background: var(--muted); }
.tl-content { flex: 1; }
.tl-text {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.6;
}
.tl-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Attraction cards ── */
.attraction {
  border: 1px solid var(--cream2);
  border-radius: 11px;
  overflow: hidden;
  margin-bottom: 12px;
}
.attraction:last-child { margin-bottom: 0; }
.attraction-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  background: var(--cream3);
  transition: background .15s;
}
.attraction-header:hover { background: var(--cream2); }
.attr-emoji { font-size: 20px; }
.attr-name {
  flex: 1;
  font-weight: 500;
  font-size: 14px;
  color: var(--navy);
}
.attr-chv { font-size: 10px; color: var(--muted); transition: transform .2s; }
.attr-chv.open { transform: rotate(90deg); }
.attraction-body { display: none; padding: 14px; border-top: 1px solid var(--cream2); }
.attraction-body.open { display: block; }
.attr-history {
  font-size: 13px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 12px;
}
.fun-facts { margin-top: 10px; }
.fun-facts-title {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 7px;
}
.fun-fact {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.55;
}
.fun-fact::before {
  content: '✦';
  color: var(--gold);
  flex-shrink: 0;
  font-size: 10px;
  margin-top: 3px;
}

/* ── Checklist ── */
.checklist { list-style: none; }
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--cream2);
  cursor: pointer;
  transition: opacity .2s;
}
.check-item:last-child { border-bottom: none; }
.check-item.done { opacity: .5; }
.check-box {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--cream2);
  background: #fff;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  transition: all .2s;
}
.check-item.done .check-box {
  background: var(--green);
  border-color: var(--green);
}
.check-label { font-size: 13.5px; line-height: 1.5; }
.check-item.done .check-label { text-decoration: line-through; color: var(--muted); }
.check-cat {
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-top: 12px;
  margin-bottom: 4px;
  padding-left: 30px;
}

/* ── Info boxes ── */
.infobox {
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.65;
  display: flex;
  gap: 10px;
}
.infobox:last-child { margin-bottom: 0; }
.infobox-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.infobox-content {}
.infobox-title { font-weight: 500; margin-bottom: 3px; font-size: 13px; }
.infobox-text { color: var(--muted); font-size: 12.5px; }
.ib-amber { background: var(--amber-l); border-left: 3px solid #f59e0b; }
.ib-amber .infobox-title { color: var(--amber); }
.ib-green { background: var(--green-l); border-left: 3px solid #22c55e; }
.ib-green .infobox-title { color: var(--green); }
.ib-purple { background: var(--purple-l); border-left: 3px solid #8b5cf6; }
.ib-purple .infobox-title { color: var(--purple); }
.ib-red { background: var(--red-l); border-left: 3px solid #ef4444; }
.ib-red .infobox-title { color: var(--red); }
.ib-navy { background: #e8eef7; border-left: 3px solid var(--navy); }
.ib-navy .infobox-title { color: var(--navy); }

/* ── Ticket info ── */
.ticket-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--cream2);
  font-size: 13px;
}
.ticket-row:last-child { border-bottom: none; }
.ticket-name { font-weight: 500; color: var(--navy); min-width: 130px; }
.ticket-info { color: var(--muted); flex: 1; font-size: 12.5px; line-height: 1.55; }
.ticket-info a { color: var(--blue); text-decoration: none; }
.ticket-info a:hover { text-decoration: underline; }

/* ── Tips ── */
.tip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .tip-grid { grid-template-columns: 1fr; } }
.tip-card {
  background: var(--cream3);
  border: 1px solid var(--cream2);
  border-radius: 10px;
  padding: 12px;
}
.tip-card-icon { font-size: 20px; margin-bottom: 6px; }
.tip-card-title { font-size: 12px; font-weight: 500; color: var(--navy); margin-bottom: 5px; }
.tip-card-text { font-size: 12px; color: var(--muted); line-height: 1.55; }

/* ── Swap box ── */
.swap-box {
  background: linear-gradient(135deg, #1a1a3e, #2d1b69);
  border-radius: 11px;
  padding: 14px 16px;
  color: rgba(255,255,255,.85);
  margin-bottom: 12px;
}
.swap-title {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold2);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.swap-text { font-size: 12.5px; line-height: 1.6; }

/* ── Progress ── */
.progress-bar-wrap {
  background: rgba(255,255,255,.08);
  border-radius: 4px;
  height: 3px;
  margin-top: 10px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 4px;
  transition: width .5s ease;
}

/* ── Fade in ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.main-content { animation: fadeIn .3s ease; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cream2); border-radius: 4px; }

.alt-label {
  display: inline-block;
  font-size: 10px;
  background: var(--purple-l);
  color: var(--purple);
  padding: 1px 7px;
  border-radius: 8px;
  font-weight: 500;
  margin-left: 6px;
  vertical-align: middle;
}
</style>
</head>

<div id="ios-hint" style="display:none;background:#0f1f38;color:rgba(255,255,255,.85);text-align:center;font-size:12px;padding:8px 16px;padding-top:max(8px,env(safe-area-inset-top));font-family:sans-serif;position:sticky;top:0;z-index:200;">

<header class="app-header">
  <div class="header-inner">
    <div class="header-crown">👑</div>

  </nav>
</header>

<main class="main" id="mainContent"></main>

<script>
// ── Data ──────────────────────────────────────────────────────────
const DAYS = [
{
  id:1, label:"D1", short:"抵达", date:"4月3日 周五",

    {text:"建议入住后尽量撑到当地20:00以后再睡，帮助快速调整时差",warn:true}

// ── Weather fetch ─────────────────────────────────────────────────
const WMO_CODES = {
  0:"晴天",1:"基本晴",2:"部分多云",3:"阴天",
  45:"雾",48:"雾凇",
  51:"小毛毛雨",53:"毛毛雨",55:"浓毛毛雨",
  61:"小雨",63:"中雨",65:"大雨",
  71:"小雪",73:"中雪",75:"大雪",
  80:"阵雨",81:"强阵雨",82:"暴阵雨",
  95:"雷暴",96:"冰雹雷暴",99:"强冰雹雷暴"
};
const WMO_ICONS = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",53:"🌦️",55:"🌧️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"🌨️",73:"🌨️",75:"❄️",
  80:"🌦️",81:"🌧️",82:"⛈️",
  95:"⛈️",96:"⛈️",99:"⛈️"
};

const weatherCache = {};

async function fetchWeather(lat, lon, dateStr) {
  const key = `${lat},${lon},${dateStr}`;
  if (weatherCache[key]) return weatherCache[key];
  try {
    // Fetch 16-day forecast array and find the matching date by index
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode,windspeed_10m_max&timezone=Europe%2FLondon&forecast_days=16`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const d = await r.json();
    if (!d.daily || !d.daily.time) return null;
    const idx = d.daily.time.indexOf(dateStr);
    if (idx === -1) return null; // date not in forecast window
    const result = {
      max: Math.round(d.daily.temperature_2m_max[idx]),
      min: Math.round(d.daily.temperature_2m_min[idx]),
      rain: (d.daily.precipitation_sum[idx] || 0).toFixed(1),
      code: d.daily.weathercode[idx],
      wind: Math.round(d.daily.windspeed_10m_max[idx])
    };
    weatherCache[key] = result;
    return result;
  } catch(e) { return null; }
}

function getOutfitAdvice(code, max, min, wind) {
  let clothes = [];
  if (min < 8) clothes.push("厚外套必备");
  else if (min < 12) clothes.push("防风外套");
  else clothes.push("轻薄外套");
  if ([61,63,65,80,81,82,51,53,55].includes(code)) clothes.push("带雨伞/雨衣");
  if (wind > 30) clothes.push("防风帽");
  if (max > 18) clothes.push("可备T恤换穿");
  clothes.push("舒适步行鞋");
  return clothes.join(" · ");
}

function getDayDate(dayId) {
  // D1 = April 3 2026
  const start = new Date('2026-04-03');
  const d = new Date(start);
  d.setDate(start.getDate() + dayId - 1);
  return d.toISOString().split('T')[0];
}

      <div class="section-header" id="sh-t${d.id}" onclick="toggleSection('t${d.id}')">
        <div class="section-icon si-red">🎟️</div>
        <div class="section-label">购票 / 预约信息</div>
        <div class="section-chevron" id="sc-t${d.id}">▶</div>
      </div>
      <div class="section-body" id="sb-t${d.id}">`;
    d.tickets.forEach(t => {
      html += `<div class="ticket-row"><span class="ticket-name">${t.name}</span><span class="ticket-info">${t.info}</span></div>`;
    });
    html += `</div></div>`;
  }

  // Tips
  if (d.tips) {
    html += `<div class="section-card">
      <div class="section-header" id="sh-tp${d.id}" onclick="toggleSection('tp${d.id}')">
        <div class="section-icon si-purple">💡</div>
        <div class="section-label">游玩贴士 & 穿衣指南</div>
        <div class="section-chevron" id="sc-tp${d.id}">▶</div>
      </div>
      <div class="section-body" id="sb-tp${d.id}">
        <div class="tip-grid">`;
    d.tips.forEach(tip => {
      html += `<div class="tip-card">
        <div class="tip-card-icon">${tip.icon}</div>
        <div class="tip-card-title">${tip.title}</div>
        <div class="tip-card-text">${tip.text}</div>
      </div>`;
    });
    html += `</div></div></div>`;
  }

  html += `</div>`;
  return html;
}

function switchDay(id) {
  currentDay = id;
  renderNav();
  const d = DAYS[id-1];
  document.getElementById('mainContent').innerHTML = renderDay(d);
  renderWeatherCard(d, `wc-${id}`);
  window.scrollTo({top:0, behavior:'smooth'});
  document.getElementById('headerWeather').textContent = '🌤 加载中…';
}

function scrollToWeather() {
  const el = document.getElementById(`wc-${currentDay}`);
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

// iOS hint
if (/iPhone|iPad/i.test(navigator.userAgent) && !window.navigator.standalone) {
  const hint = document.getElementById('ios-hint');
  if (hint && !localStorage.getItem('ios-hint-dismissed')) {
    hint.style.display = 'block';
  }
  const btn = hint && hint.querySelector('button');
  if (btn) btn.addEventListener('click', () => localStorage.setItem('ios-hint-dismissed','1'));
}

// Init
renderNav();
switchDay(1);
</script>
</body>
</html>
